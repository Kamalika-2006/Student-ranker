<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/upd" method="POST">
        <label>Enter the roll no to update:</label>
        <input type="number" name="upd_rno"/>
        {% for i in range(upd_sub_num)%}
            <h3>Enter the subject name:</h3>
            <input type="text" name="sub_name{{i}}"/>
            <h3>Updated marks:</h3>
            <input type="number" name="upd_marks{{i}}"/>
        {% endfor %}
        <button type="submit">Update</button>
    </form>
</body>
</html>
