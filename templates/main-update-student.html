<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='updateStudent.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">
</head>
<body>
    {% include "sidebar.html" %}
    <div class="content">
    <div class="main-container">
        <h2>Update Student</h2>
    <form action="/upd" method="POST">
        <label>Enter the roll no to update:</label>
        <input type="number" name="upd_rno"/>
        {% for i in range(upd_sub_num)%}
            <h3>Enter the subject name:</h3>
            <input type="text" name="sub_name{{i}}"/>
            <h3>Updated marks:</h3>
            <input type="number" name="upd_marks{{i}}"/>
        {% endfor %}
        <button type="submit">Update</button>
    </form>
    </div>
    </div>
</body>
</html>
